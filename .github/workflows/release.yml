name: Build and Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Read release version
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content version.txt -Raw).Trim()
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "version.txt must use X.Y.Z format. Received: $version"
          }

          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build]"

      - name: Verify release version
        shell: pwsh
        run: |
          $packageVersion = python -c "from importlib.metadata import version; print(version('unity-info-mcp'))"
          if ($packageVersion -ne $env:VERSION) {
            throw "Installed Python package version ($packageVersion) does not match version.txt ($env:VERSION)."
          }

      - name: Build Python package
        shell: pwsh
        run: |
          python -m build --outdir python-dist
          Move-Item "python-dist\unity_info_mcp-${env:VERSION}.tar.gz" "UnityInfoMCP-v${env:VERSION}.tar.gz"
          Move-Item "python-dist\unity_info_mcp-${env:VERSION}-py3-none-any.whl" "UnityInfoMCP-v${env:VERSION}-py3-none-any.whl"

      - name: Create PyInstaller entry script
        shell: pwsh
        run: |
          @'
          from UnityInfoMCP.__main__ import main

          if __name__ == "__main__":
              main()
          '@ | Set-Content -Path build_entry.py -Encoding utf8

      - name: Build UnityInfoMCP executable
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --onefile `
            --name "UnityInfoMCP_v${env:VERSION}" `
            --distpath pyinstaller-dist `
            --workpath pyinstaller-build `
            --specpath pyinstaller-spec `
            --paths . `
            --collect-all mcp `
            --collect-all uvicorn `
            --collect-all starlette `
            --collect-all anyio `
            build_entry.py

      - name: Build UnityInfoBridge variants
        shell: pwsh
        run: |
          Set-Location UnityInfoBridge
          .\build.ps1

      - name: Prepare release artifacts
        shell: pwsh
        run: |
          $version = $env:VERSION
          $releaseRoot = Join-Path $PWD "release_artifacts"
          $bridgeReleaseRoot = Join-Path $PWD "UnityInfoBridge\\Release"

          function Ensure-Dir([string]$path) {
            New-Item -ItemType Directory -Path $path -Force | Out-Null
          }

          function Copy-BridgeArtifacts([string]$sourceDir, [string]$targetDir, [string]$mainDllName) {
            if (-not (Test-Path $sourceDir)) {
              throw "Missing build output directory: $sourceDir"
            }

            Ensure-Dir $targetDir

            $mainPdbName = [System.IO.Path]::GetFileNameWithoutExtension($mainDllName) + ".pdb"
            $mainDepsName = [System.IO.Path]::GetFileNameWithoutExtension($mainDllName) + ".deps.json"
            Get-ChildItem -Path $sourceDir -File | ForEach-Object {
              $destinationName = $_.Name
              if ($_.Name -ieq $mainDllName) {
                $destinationName = "UnityInfoBridge.dll"
              } elseif ($_.Name -ieq $mainPdbName) {
                $destinationName = "UnityInfoBridge.pdb"
              } elseif ($_.Name -ieq $mainDepsName) {
                $destinationName = "UnityInfoBridge.deps.json"
              }

              Copy-Item -Path $_.FullName -Destination (Join-Path $targetDir $destinationName) -Force
            }
          }

          function New-MelonLoaderZip([string]$runtime, [string]$sourceDir, [string]$mainDllName) {
            $packageRoot = Join-Path $releaseRoot "melonloader_${runtime}"
            $modsDir = Join-Path $packageRoot "Mods"
            $zipPath = Join-Path $PWD "UnityInfoBridge_v${version}_MelonLoader_${runtime}.zip"

            Copy-BridgeArtifacts $sourceDir $modsDir $mainDllName
            if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
            Compress-Archive -Path (Join-Path $packageRoot "*") -DestinationPath $zipPath
          }

          function New-BepInExZip([string]$runtime, [string]$sourceDir, [string]$mainDllName) {
            $packageRoot = Join-Path $releaseRoot "bepinex_${runtime}"
            $pluginDir = Join-Path $packageRoot "BepInEx\\plugins\\UnityInfoBridge"
            $zipPath = Join-Path $PWD "UnityInfoBridge_v${version}_BepInEx_${runtime}.zip"

            Copy-BridgeArtifacts $sourceDir $pluginDir $mainDllName
            if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
            Compress-Archive -Path (Join-Path $packageRoot "*") -DestinationPath $zipPath
          }

          $melonMonoDir = Join-Path $bridgeReleaseRoot "UnityInfoBridge.MelonLoader.Mono"
          $melonIl2CppDir = Join-Path $bridgeReleaseRoot "UnityInfoBridge.MelonLoader.IL2CPP"
          $bepMonoDir = Join-Path $bridgeReleaseRoot "UnityInfoBridge.BepInEx.Mono"
          $bepIl2CppDir = Join-Path $bridgeReleaseRoot "UnityInfoBridge.BepInEx.IL2CPP"

          Ensure-Dir $releaseRoot
          Copy-Item -Path (Join-Path $PWD "pyinstaller-dist\\UnityInfoMCP_v${version}.exe") -Destination (Join-Path $PWD "UnityInfoMCP_v${version}.exe") -Force

          New-MelonLoaderZip "Mono" $melonMonoDir "UnityInfoBridge.MelonLoader.Mono.dll"
          New-MelonLoaderZip "IL2CPP" $melonIl2CppDir "UnityInfoBridge.MelonLoader.IL2CPP.dll"
          New-BepInExZip "Mono" $bepMonoDir "UnityInfoBridge.BepInEx.Mono.dll"
          New-BepInExZip "IL2CPP" $bepIl2CppDir "UnityInfoBridge.BepInEx.IL2CPP.dll"

      - name: Generate checksums
        shell: pwsh
        run: |
          $files = @(
            "UnityInfoMCP_v${env:VERSION}.exe",
            "UnityInfoMCP-v${env:VERSION}.tar.gz",
            "UnityInfoMCP-v${env:VERSION}-py3-none-any.whl",
            "UnityInfoBridge_v${env:VERSION}_MelonLoader_Mono.zip",
            "UnityInfoBridge_v${env:VERSION}_MelonLoader_IL2CPP.zip",
            "UnityInfoBridge_v${env:VERSION}_BepInEx_Mono.zip",
            "UnityInfoBridge_v${env:VERSION}_BepInEx_IL2CPP.zip"
          )
          $hashes = foreach ($file in $files) {
            $hash = (Get-FileHash $file -Algorithm SHA256).Hash.ToLower()
            "$hash  $file"
          }
          Set-Content -Path "SHA256SUMS.txt" -Value $hashes

      - name: Create tag
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag v${env:VERSION} ${{ github.sha }}
          git push origin v${env:VERSION}

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          draft: true
          generate_release_notes: true
          files: |
            UnityInfoMCP_v${{ steps.version.outputs.version }}.exe
            UnityInfoMCP-v${{ steps.version.outputs.version }}.tar.gz
            UnityInfoMCP-v${{ steps.version.outputs.version }}-py3-none-any.whl
            UnityInfoBridge_v${{ steps.version.outputs.version }}_MelonLoader_Mono.zip
            UnityInfoBridge_v${{ steps.version.outputs.version }}_MelonLoader_IL2CPP.zip
            UnityInfoBridge_v${{ steps.version.outputs.version }}_BepInEx_Mono.zip
            UnityInfoBridge_v${{ steps.version.outputs.version }}_BepInEx_IL2CPP.zip
            SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
